name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fontist
        uses: fontist/setup-fontist@v2

      - name: Install IBM Plex fonts
        run: |
          fontist install "IBM Plex Sans"
          fontist install "IBM Plex Serif"

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile resume
        run: typst compile resume.typ resume.pdf --font-path ~/.fontist/fonts

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: resume.pdf

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: resume.pdf
